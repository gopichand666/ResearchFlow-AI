<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ResearchFlow AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page animate-bg">
    <div class="login-bg-shapes">
        <!-- Floating Elements -->
        <div class="paper-icon-float" style="top: 10%; left: 5%; --duration: 20s;">📄</div>
        <div class="paper-icon-float" style="top: 40%; right: 10%; --duration: 25s;">📊</div>
        <div class="paper-icon-float" style="bottom: 10%; left: 15%; --duration: 18s;">🧠</div>
        <div class="paper-icon-float" style="top: 20%; right: 30%; --duration: 22s;">📄</div>
        <div class="paper-icon-float" style="bottom: 30%; right: 20%; --duration: 28s;">📈</div>
        
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
    </div>

    <div class="login-wrapper">
        <div class="logo" style="justify-content: center; margin-bottom: 24px;">
            <div class="logo-mark">RF</div>
            <div class="logo-text">
                <span class="logo-title">ResearchFlow</span>
                <span class="logo-sub">AI Memento</span>
            </div>
        </div>

        <div class="login-card-container glass animate-pop">
            <div class="login-header">
                <h2>Welcome to ResearchFlow</h2>
                <div class="typing-container" id="loginTyping"></div>
            </div>

            <form id="loginForm" class="login-form-content">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-with-icon glass">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="emailInput" placeholder="you@example.com" required>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="primary-btn full-width">
                    <span>Send Verification Code</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>

            <form id="otpForm" class="login-form-content hidden">
                <div class="otp-alert glass">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.29 6.29l.83-.83a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 17z"/></svg>
                    <span>Check your email for the 6-digit code.</span>
                </div>
                <div class="form-group">
                    <label>Verification Code</label>
                    <input type="text" id="otpInput" class="otp-field glass" placeholder="· · · · · ·" maxlength="6" required>
                </div>
                <button type="submit" id="verifyBtn" class="primary-btn full-width">
                    <span>Verify & Login</span>
                </button>
                <button type="button" id="backBtn" class="back-link">← Use a different email</button>
            </form>

            <div id="loginError" class="error-msg hidden"></div>
        </div>
        
        <p class="login-footer">Analyze. Compare. Evolve.</p>
    </div>

    <script src="login.js"></script>
    <script>
        document.getElementById('backBtn')?.addEventListener('click', () => {
            document.getElementById('otpForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
        });
    </script>
</body>
</html>
